spring:
  application:
    name: activo2incidencias
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 25MB

app:
  jwt:
    secret: ${JWT_SECRET:CAMBIA_ESTE_SECRETO_EN_PRODUCCION_MIN_32_CHARS}
    expiration-minutes: 480
  public-url: ${APP_PUBLIC_URL:http://localhost:4200}
  storage:
    root-path: ${STORAGE_ROOT:./uploads}
  incidencias:
    max-imagenes: 5
    tamano-maximo-imagen-mb: 5
    descripcion-min-longitud: 10
    descripcion-max-longitud: 1000
  whatsapp:
    proveedor: ${WHATSAPP_PROVIDER:mock}
    numero-emisor: ${WHATSAPP_SENDER:+34600000000}
  rate-limit:
    public-incidencias-por-minuto: 6

springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/activo2incidencias}
    username: ${DB_USER:activo2incidencias}
    password: ${DB_PASSWORD:activo2incidencias}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.mercadona.activo2incidencias: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.mercadona.activo2incidencias: INFO

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:activo2incidencias;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: sa
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
