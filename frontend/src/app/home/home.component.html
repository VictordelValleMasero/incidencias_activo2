<div class="home">
  <header class="home-header">
    <h1>Últimas nóminas</h1>
  </header>

  <section class="nominas card">
    @for (n of nominas; track n.mes; let last = $last) {
      <div class="nomina-row" [class.no-border]="last">
        <span>{{ n.mes }}</span>
        <svg viewBox="0 0 24 24" class="icon-download" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v12" />
          <path d="M7 10l5 5 5-5" />
          <path d="M5 20h14" />
        </svg>
      </div>
    }
  </section>

  <section class="tiles">
    @for (tile of tiles; track tile.id) {
      <button type="button" class="tile" (click)="onTileClick(tile)">
        <span class="tile-icon" [ngClass]="tile.className">
          @switch (tile.id) {
            @case ('salario') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="15" r="5.5" />
                <circle cx="15" cy="9" r="5.5" />
                <path d="M9 15h.01" />
              </svg>
            }
            @case ('jornada') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="5" width="14" height="15" rx="2" />
                <path d="M7 3v4M13 3v4M3 10h14" />
                <circle cx="18" cy="17" r="4.2" />
                <path d="M18 15v2l1.4 1.4" />
              </svg>
            }
            @case ('documentos') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 8a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8z" />
              </svg>
            }
            @case ('formacion') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 9l10-4 10 4-10 4-10-4z" />
                <path d="M6 11v5c0 1.4 2.7 2.5 6 2.5s6-1.1 6-2.5v-5" />
              </svg>
            }
            @case ('informacion') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 5h13a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-6l-4 3v-3H8a2 2 0 0 1-2-2" />
                <path d="M12 10h.01M12 8v.01" />
                <circle cx="12" cy="10.6" r="0.4" fill="currentColor" stroke="none" />
              </svg>
            }
            @case ('incidencias') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3.5l9.5 16.5H2.5L12 3.5z" />
                <path d="M12 10v4" />
                <path d="M12 16.6h.01" />
              </svg>
            }
          }
        </span>
        <span class="tile-label">{{ tile.label }}</span>
      </button>
    }
  </section>
</div>

<nav class="bottom-nav">
  <button type="button" class="nav-item active" aria-label="Inicio">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 11.5L12 4l8 7.5" />
      <path d="M6 10v9a1 1 0 0 0 1 1h3v-6h4v6h3a1 1 0 0 0 1-1v-9" />
    </svg>
  </button>
  <button type="button" class="nav-item" aria-label="Notificaciones">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 10a6 6 0 0 1 12 0c0 4.5 1.5 6 1.5 6h-15S6 14.5 6 10z" />
      <path d="M10 19a2 2 0 0 0 4 0" />
    </svg>
  </button>
  <button type="button" class="nav-item" aria-label="Perfil">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="8.5" r="3.5" />
      <path d="M4.5 20a7.5 7.5 0 0 1 15 0" />
    </svg>
  </button>
</nav>
